name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-tests:
    name: macOS Tests (${{ matrix.name }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Xcode 16.0"
            swift: "6.0"
            xcode: "16.0"
          - name: "Xcode 16.1"
            swift: "6.0"
            xcode: "16.1"
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Show Swift version
        run: swift --version
      
      - name: Build
        run: swift build
      
      - name: Run tests
        run: swift test
